name: Deploy Framework to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build dist
        run: python3 scripts/build_dist.py

      - name: Prepare pages content
        run: |
          mkdir -p _site
          cp dist/chevp-ai-framework.md _site/chevp-ai-framework.md
          cat > _site/index.html << 'EOF'
          <!DOCTYPE html>
          <html><head><meta http-equiv="refresh" content="0;url=https://github.com/chevp/chevp-ai-framework"></head></html>
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
