name: Deploy Framework to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build dist
        run: python3 scripts/build_dist.py

      - name: Prepare pages content
        run: |
          mkdir -p _site
          cp dist/chevp-ai-framework.md _site/chevp-ai-framework.md
          cp docs/*.html _site/
          cp docs/robots.txt _site/robots.txt
          cp docs/sitemap.xml _site/sitemap.xml
          cp docs/llms.txt _site/llms.txt
          cp -r docs/images _site/images 2>/dev/null || true
          cp -r docs/flow _site/flow 2>/dev/null || echo "no docs/flow checked in yet — lab subsite will be missing"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
